# Deploy plugin vs08-voyages vers Hostinger (sortirmonde.fr)
# Ce dépôt = contenu du plugin uniquement (racine = plugin)
name: Deploy to Hostinger (sortirmonde.fr)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  SSH_OPTS: -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -p 65002
  WEBROOT: /home/${{ secrets.FTP_USERNAME }}/domains/sortirmonde.fr/public_html

jobs:
  deploy:
    name: Deploy plugin via SSH
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy plugin vs08-voyages (with retry)
        run: |
          ok=0
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 — Deploy plugin ==="
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
              --exclude='config.cfg' \
              --exclude='wp-content/plugins/' \
              --exclude='wp-content/themes/' \
              -e "ssh ${{ env.SSH_OPTS }}" \
              wp-content/plugins/vs08-voyages/ \
              ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:${{ env.WEBROOT }}/wp-content/plugins/vs08-voyages/; then
              echo "Plugin deployed OK" && ok=1 && break
            fi
            echo "Attempt $attempt failed, waiting 10s..."
            sleep 10
          done
          [ "$ok" -eq 1 ] || exit 1

      - name: Deploy plugin vs08-circuits (with retry)
        run: |
          ok=0
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 — Deploy Circuits ==="
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
              -e "ssh ${{ env.SSH_OPTS }}" \
              wp-content/plugins/vs08-circuits/ \
              ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:${{ env.WEBROOT }}/wp-content/plugins/vs08-circuits/; then
              echo "Plugin Circuits deployed OK" && ok=1 && break
            fi
            echo "Attempt $attempt failed, waiting 10s..."
            sleep 10
          done
          [ "$ok" -eq 1 ] || echo "Circuits deploy failed (non-blocking)"

      - name: Deploy plugin vs08-sejours (with retry)
        run: |
          ok=0
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 — Deploy Sejours ==="
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
              --exclude='config.cfg' \
              -e "ssh ${{ env.SSH_OPTS }}" \
              wp-content/plugins/vs08-sejours/ \
              ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:${{ env.WEBROOT }}/wp-content/plugins/vs08-sejours/; then
              echo "Plugin Sejours deployed OK" && ok=1 && break
            fi
            echo "Attempt $attempt failed, waiting 10s..."
            sleep 10
          done
          [ "$ok" -eq 1 ] || echo "Sejours deploy failed (non-blocking)"

      - name: Deploy plugin vs08-splitpay (with retry)
        run: |
          ok=0
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 — Deploy SplitPay ==="
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
              -e "ssh ${{ env.SSH_OPTS }}" \
              wp-content/plugins/vs08-splitpay/ \
              ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:${{ env.WEBROOT }}/wp-content/plugins/vs08-splitpay/; then
              echo "Plugin SplitPay deployed OK" && ok=1 && break
            fi
            echo "Attempt $attempt failed, waiting 10s..."
            sleep 10
          done
          [ "$ok" -eq 1 ] || echo "SplitPay deploy failed (non-blocking)"

      - name: Deploy plugin vs08-seo (with retry)
        run: |
          ok=0
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 — Deploy SEO ==="
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
              -e "ssh ${{ env.SSH_OPTS }}" \
              wp-content/plugins/vs08-seo/ \
              ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:${{ env.WEBROOT }}/wp-content/plugins/vs08-seo/; then
              echo "Plugin SEO deployed OK" && ok=1 && break
            fi
            echo "Attempt $attempt failed, waiting 10s..."
            sleep 10
          done
          [ "$ok" -eq 1 ] || echo "SEO deploy failed (non-blocking)"

      - name: Deploy mu-plugins (with retry)
        run: |
          ok=0
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 — Deploy mu-plugins ==="
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz \
              -e "ssh ${{ env.SSH_OPTS }}" \
              wp-content/mu-plugins/ \
              ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:${{ env.WEBROOT }}/wp-content/mu-plugins/; then
              echo "mu-plugins deployed OK" && ok=1 && break
            fi
            echo "Attempt $attempt failed, waiting 10s..."
            sleep 10
          done
          [ "$ok" -eq 1 ] || echo "mu-plugins deploy failed (non-blocking)"

      # ATTENTION : PAS de --delete sur le theme !
      # Le repo ne contient que des fichiers de surcharge (footer.php, single-vs08_voyage.php).
      # Le theme complet (style.css, header.php, functions.php, logo, assets) vit UNIQUEMENT sur le serveur.
      # Ajouter --delete ici DETRUIRAIT le site (deja arrive ne JAMAIS refaire).
      - name: Deploy theme vs08-theme (with retry)
        run: |
          ok=0
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 — Deploy theme ==="
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz \
              -e "ssh ${{ env.SSH_OPTS }}" \
              wp-content/themes/vs08-theme/ \
              ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:${{ env.WEBROOT }}/wp-content/themes/vs08-theme/; then
              echo "Theme deployed OK" && ok=1 && break
            fi
            echo "Attempt $attempt failed, waiting 10s..."
            sleep 10
          done
          [ "$ok" -eq 1 ] || echo "Theme deploy failed (non-blocking)"

      - name: Remove paybox-polyfill + force opcache invalidation via touch
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh ${{ env.SSH_OPTS }} \
            ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} "
            rm -f ${{ env.WEBROOT }}/wp-content/mu-plugins/paybox-polyfill.php
            find ${{ env.WEBROOT }}/wp-content/plugins/vs08-voyages -name '*.php' -exec touch {} +
            find ${{ env.WEBROOT }}/wp-content/plugins/vs08-circuits -name '*.php' -exec touch {} +
            find ${{ env.WEBROOT }}/wp-content/plugins/vs08-sejours -name '*.php' -exec touch {} +
            find ${{ env.WEBROOT }}/wp-content/plugins/vs08-splitpay -name '*.php' -exec touch {} +
            find ${{ env.WEBROOT }}/wp-content/plugins/vs08-seo -name '*.php' -exec touch {} +
            find ${{ env.WEBROOT }}/wp-content/mu-plugins -name '*.php' -exec touch {} +
            echo 'Files touched + paybox removed'
          " || echo "Touch/remove skipped (non-blocking)"

      - name: Purge caches and opcache
        run: |
          ok=0
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt/3 — Purge caches ==="
            if sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh ${{ env.SSH_OPTS }} \
              ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} "
              WEBROOT=${{ env.WEBROOT }}
              rm -rf \$WEBROOT/wp-content/cache/
              rm -rf \$WEBROOT/wp-content/litespeed/
              rm -rf \$WEBROOT/wp-content/advanced-cache.php
              echo '<?php if(function_exists(\"opcache_reset\")){opcache_reset();} foreach(glob(__DIR__.\"/wp-content/plugins/vs08-*/includes/*.php\") as \$f){if(function_exists(\"opcache_invalidate\"))opcache_invalidate(\$f,true);} foreach(glob(__DIR__.\"/wp-content/plugins/vs08-*/*.php\") as \$f){if(function_exists(\"opcache_invalidate\"))opcache_invalidate(\$f,true);} foreach(glob(__DIR__.\"/wp-content/mu-plugins/*.php\") as \$f){if(function_exists(\"opcache_invalidate\"))opcache_invalidate(\$f,true);} echo \"opcache purged\";' > \$WEBROOT/_opcache_flush.php
              curl -s https://sortirmonde.fr/_opcache_flush.php || true
              curl -s https://sortirmonde.fr/_opcache_flush.php || true
              rm -f \$WEBROOT/_opcache_flush.php
              echo 'Cache purged OK'
            "; then ok=1; break; fi
            echo "Attempt $attempt failed, waiting 10s..."
            sleep 10
          done
          [ "$ok" -eq 1 ] || exit 1

      - name: Health check — disable mu-plugins if site is down
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://sortirmonde.fr/ || echo "000")
          echo "Site status: HTTP $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "301" ] && [ "$STATUS" != "302" ]; then
            echo "Site is DOWN — disabling custom mu-plugins..."
            sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh ${{ env.SSH_OPTS }} \
              ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }} \
              "cd ${{ env.WEBROOT }}/wp-content/mu-plugins && for f in vs08-*.php; do [ -f \"\$f\" ] && mv \"\$f\" \"\$f.disabled\" && echo \"Disabled: \$f\"; done" \
            || true
            sleep 3
            STATUS2=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://sortirmonde.fr/ || echo "000")
            echo "After disabling mu-plugins: HTTP $STATUS2"
          else
            echo "Site is UP — mu-plugins OK"
          fi
