; VS08 — augmenter la mémoire PHP pour le checkout WooCommerce
; Yoast SEO + WooCommerce save_post hooks consomment beaucoup de RAM
memory_limit = 768M
max_execution_time = 120

; Sécurité production — ne JAMAIS afficher les erreurs PHP aux visiteurs
display_errors = Off
log_errors = On
expose_php = Off
